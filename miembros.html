<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="./dist/output.css" rel="stylesheet">
  <title>POLARIS - Miembros</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 px-3 py-6 text-slate-900 sm:px-5 sm:py-8" style="font-family: 'Sora', sans-serif;">
  <main class="mx-auto w-full max-w-6xl rounded-3xl bg-gradient-to-br from-slate-300 via-slate-300 to-slate-400 p-4 shadow-2xl ring-1 ring-cyan-100/25 sm:p-6 lg:p-8">
    <nav class="mb-6 rounded-2xl bg-slate-950/90 px-4 py-3 shadow-xl ring-1 ring-cyan-100/20 sm:px-6">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <a href="/" class="text-2xl font-black uppercase tracking-wide text-cyan-300" style="font-family: 'Archivo Black', sans-serif;">POLARIS</a>
        <ul class="flex flex-wrap gap-2 text-sm font-semibold">
          <li><a href="/" class="inline-flex rounded-lg px-3 py-2 text-slate-200 transition hover:bg-slate-800/70">Inicio</a></li>
          <li><a href="/registro.html" class="inline-flex rounded-lg px-3 py-2 text-slate-200 transition hover:bg-slate-800/70">Registro</a></li>
          <li><a href="/proyectos.html" class="inline-flex rounded-lg px-3 py-2 text-slate-200 transition hover:bg-slate-800/70">Proyectos</a></li>
          <li><a href="/miembros.html" class="inline-flex rounded-lg bg-cyan-500/20 px-3 py-2 text-cyan-100 ring-1 ring-cyan-300/40">Miembros</a></li>
        </ul>
      </div>
    </nav>

    <header class="relative mb-6 overflow-hidden rounded-2xl bg-gradient-to-r from-slate-950 via-blue-950 to-slate-900 px-5 pb-6 pt-5 text-white shadow-2xl sm:px-8 sm:pt-7">
      <div class="pointer-events-none absolute -left-10 -top-16 h-40 w-40 rounded-full bg-cyan-400/20 blur-2xl"></div>
      <div class="pointer-events-none absolute -right-8 bottom-0 h-24 w-44 rounded-full bg-cyan-300/15 blur-2xl"></div>
      <h1 class="relative text-5xl leading-none font-black uppercase tracking-wide text-cyan-300 drop-shadow-2xl sm:text-6xl" style="font-family: 'Archivo Black', sans-serif;">MIEMBROS</h1>
      <p class="relative mt-2 text-sm font-semibold text-cyan-100 sm:text-base">Listado de miembros registrados en el sistema.</p>
    </header>

    <section class="rounded-2xl bg-white/95 p-6 shadow-xl ring-1 ring-slate-200">
      <div class="mb-4 flex items-center justify-between gap-3">
        <h2 class="text-2xl font-extrabold text-slate-800">Directorio de miembros</h2>
        <button id="refreshMembersButton" class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold transition hover:bg-slate-50">Actualizar</button>
      </div>
      <p id="membersMessage" class="mb-3 text-sm"></p>
      <div id="membersViewList" class="space-y-3"></div>
    </section>
  </main>

  <section id="editMemberModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4">
    <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200">
      <div class="mb-4 flex items-center justify-between">
        <h3 class="text-xl font-extrabold text-slate-800">Editar miembro</h3>
        <button id="closeEditMemberModalButton" type="button" class="rounded-lg border border-slate-300 px-3 py-1 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cerrar</button>
      </div>
      <form id="editMemberBasicForm" class="space-y-4">
        <div>
          <label for="editMemberNombre" class="mb-2 block text-sm font-semibold text-slate-700">Nombre completo</label>
          <input id="editMemberNombre" name="nombre" type="text" required class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none transition duration-200 focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100">
        </div>
        <div>
          <label for="editMemberCorreo" class="mb-2 block text-sm font-semibold text-slate-700">Correo electronico</label>
          <input id="editMemberCorreo" name="correo" type="email" required class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none transition duration-200 focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100">
        </div>
        <div>
          <label for="editMemberRol" class="mb-2 block text-sm font-semibold text-slate-700">Rol</label>
          <input id="editMemberRol" name="rol" type="text" required class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none transition duration-200 focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100" placeholder="Ej: participante">
        </div>
        <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
          <button type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-cyan-600 px-4 py-3 font-extrabold text-white transition hover:bg-cyan-700">Guardar cambios</button>
          <button id="cancelEditMemberModalButton" type="button" class="inline-flex w-full items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-3 font-bold text-slate-700 transition hover:bg-slate-50">Cancelar</button>
        </div>
        <p id="editMemberFormMessage" class="text-sm"></p>
      </form>
    </div>
  </section>

  <section id="deleteMemberModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200">
      <div class="mb-4 flex items-center justify-between">
        <h3 class="text-xl font-extrabold text-slate-800">Eliminar miembro</h3>
        <button id="closeDeleteMemberModalButton" type="button" class="rounded-lg border border-slate-300 px-3 py-1 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cerrar</button>
      </div>
      <p id="deleteMemberModalText" class="text-sm text-slate-600">Confirma la eliminacion del miembro.</p>
      <div class="mt-5 grid grid-cols-1 gap-2 sm:grid-cols-2">
        <button id="confirmDeleteMemberButton" type="button" class="inline-flex w-full items-center justify-center rounded-xl bg-rose-600 px-4 py-3 font-extrabold text-white transition hover:bg-rose-700">Eliminar</button>
        <button id="cancelDeleteMemberModalButton" type="button" class="inline-flex w-full items-center justify-center rounded-xl border border-slate-300 bg-white px-4 py-3 font-bold text-slate-700 transition hover:bg-slate-50">Cancelar</button>
      </div>
    </div>
  </section>

  <script src="./src/miembros.js"></script>
</body>
</html>
